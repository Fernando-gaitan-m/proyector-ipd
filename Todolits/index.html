<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Notas - App de notas simple y eficiente">
  <title>Notas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash__content">
      <span class="splash__icon">📝</span>
      <h1 class="splash__title">Mis Notas</h1>
      <span class="splash__subtitle">Tus ideas, siempre contigo</span>
    </div>
  </div>

  <main class="app" id="app">
    <header class="app__header">
      <h1 class="app__title">Notas</h1>
      <button class="app__theme-btn" id="themeToggle" aria-label="Cambiar tema">🌙</button>
    </header>

    <section class="notes-grid" id="notesGrid"></section>

    <button class="app__fab" id="addNoteBtn" aria-label="Nueva nota">+</button>
  </main>

  <aside class="editor" id="editor">
    <header class="editor__header">
      <button class="editor__back" id="editorBack" aria-label="Volver">←</button>
      <input class="editor__title" id="editorTitle" type="text" placeholder="Título">
      <button class="editor__delete" id="editorDelete" aria-label="Eliminar nota">🗑️</button>
    </header>

    <div class="editor__toolbar" id="editorToolbar">
      <button class="toolbar-btn" data-cmd="bold" aria-label="Negrita"><strong>B</strong></button>
      <button class="toolbar-btn" data-cmd="italic" aria-label="Cursiva"><em>I</em></button>
      <button class="toolbar-btn" data-cmd="underline" aria-label="Subrayado"><u>U</u></button>
      <span class="toolbar-sep"></span>
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="h1" aria-label="Título 1">H1</button>
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="h2" aria-label="Título 2">H2</button>
      <button class="toolbar-btn" data-cmd="formatBlock" data-val="h3" aria-label="Título 3">H3</button>
      <span class="toolbar-sep"></span>
      <button class="toolbar-btn" data-cmd="insertUnorderedList" aria-label="Lista">•</button>
      <button class="toolbar-btn" data-cmd="insertOrderedList" aria-label="Lista numerada">1.</button>
      <span class="toolbar-sep"></span>
      <button class="toolbar-btn" data-cmd="removeFormat" aria-label="Limpiar formato">↺</button>
    </div>

    <div class="editor__content" id="editorContent" contenteditable="true" placeholder="Escribe algo..."></div>

    <div class="editor__date" id="editorDate"></div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
